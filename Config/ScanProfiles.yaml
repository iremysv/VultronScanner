# =============================================================================
# VultronScanner — Scan Profiles Configuration
# Dosya: Config/ScanProfiles.yaml
# Commit: feat(config): add quick, full and stealth scan profiles with module toggles
# =============================================================================

# Her profil; hangi modüllerin çalışacağını, Nmap parametrelerini
# ve gecikme/hız ayarlarını merkezi olarak tanımlar.
# CoreOrchestrator bu dosyayı okuyarak pipeline'ı yapılandırır.

profiles:

  # ── Hızlı Tarama ─────────────────────────────────────────────────────────
  quick:
    name: "Quick Scan"
    description: "En yaygın 100 portu tarar. Hızlı keşif için idealdir."
    estimated_duration: "1-3 dakika"
    
    nmap:
      arguments: "-F -T4 -sV"      # -F: top 100 ports, T4: agresif zamanlama
      timing_template: 4
      port_range: null             # null = nmap default (top 100)
    
    modules:
      discovery:
        host_discovery: true
        port_analyzer: true
        network_scanner: true
      intelligence:
        service_fingerprint: true
        web_analyzer: false        # Hızlı taramada web analizi devre dışı
        vulnerability_engine: false
        threat_scorer: true
      action:
        exploit_suggester: false
        brute_force: false
    
    report:
      format: "markdown"
      include_executive_summary: false
      verbosity: "summary"         # summary | detailed | full

  # ── Tam Tarama ────────────────────────────────────────────────────────────
  full:
    name: "Full Scan"
    description: "Tüm portları, servisleri ve zafiyetleri kapsamlı analiz eder."
    estimated_duration: "15-45 dakika"
    
    nmap:
      arguments: "-sV -sC -A -T3"  # -A: OS detect + traceroute + scriptler
      timing_template: 3
      port_range: "1-65535"        # Tüm TCP portları
    
    modules:
      discovery:
        host_discovery: true
        port_analyzer: true
        network_scanner: true
      intelligence:
        service_fingerprint: true
        web_analyzer: true
        vulnerability_engine: true  # CVE/NVD API sorgusu aktif
        threat_scorer: true
      action:
        exploit_suggester: true
        brute_force: false          # Brute force varsayılan OFF (izin gerektirir)
    
    report:
      format: "html"
      include_executive_summary: true
      verbosity: "full"

  # ── Gizli Tarama ──────────────────────────────────────────────────────────
  stealth:
    name: "Stealth Scan"
    description: "IDS/IPS sistemlerini tetiklememek için yavaş, sessiz tarama."
    estimated_duration: "30-90 dakika"
    
    nmap:
      arguments: "-sS -T1 -f --data-length 25"
                                   # -sS: SYN scan, T1: yavaş, -f: paket parçalama
      timing_template: 1
      port_range: "1-1024"         # Sadece well-known portlar
    
    modules:
      discovery:
        host_discovery: true
        port_analyzer: true
        network_scanner: true
      intelligence:
        service_fingerprint: true
        web_analyzer: false
        vulnerability_engine: true
        threat_scorer: true
      action:
        exploit_suggester: false
        brute_force: false
    
    report:
      format: "json"
      include_executive_summary: false
      verbosity: "detailed"

  # ── Web Odaklı Tarama ─────────────────────────────────────────────────────
  web:
    name: "Web Focused Scan"
    description: "Yalnızca HTTP/HTTPS servislerini ve güvenlik başlıklarını analiz eder."
    estimated_duration: "2-10 dakika"
    
    nmap:
      arguments: "-p 80,443,8080,8443,8000,8888 -sV -T4"
      timing_template: 4
      port_range: "80,443,8080,8443,8000,8888"
    
    modules:
      discovery:
        host_discovery: true
        port_analyzer: true
        network_scanner: true
      intelligence:
        service_fingerprint: true
        web_analyzer: true          # Ana hedef: HTTP güvenlik başlık analizi
        vulnerability_engine: true
        threat_scorer: true
      action:
        exploit_suggester: true
        brute_force: false
    
    report:
      format: "html"
      include_executive_summary: true
      verbosity: "detailed"

  # ── Kimlik Doğrulama Testi ────────────────────────────────────────────────
  auth:
    name: "Authentication Test"
    description: "Servis kimlik doğrulama güvenliğini test eder. Sadece izinli sistemlerde!"
    estimated_duration: "5-20 dakika"
    
    nmap:
      arguments: "-p 21,22,23,25,3389,5900 -sV -T3"
      timing_template: 3
      port_range: "21,22,23,25,3389,5900"
    
    modules:
      discovery:
        host_discovery: true
        port_analyzer: true
        network_scanner: true
      intelligence:
        service_fingerprint: true
        web_analyzer: false
        vulnerability_engine: true
        threat_scorer: true
      action:
        exploit_suggester: false
        brute_force: true           # Sadece bu profilde aktif
    
    brute_force:
      wordlist: "Config/Wordlists/default.txt"
      max_attempts: 500
      delay_between_attempts_ms: 200
    
    report:
      format: "markdown"
      include_executive_summary: true
      verbosity: "full"

# ── Profil Meta Bilgisi ───────────────────────────────────────────────────────
meta:
  default_profile: "quick"
  available_profiles:
    - "quick"
    - "full"
    - "stealth"
    - "web"
    - "auth"
